name: lensia_app_project
description: A new Flutter project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0    
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  app_links: ^7.0.0
  image_picker: ^1.2.1
  video_player: ^2.8.3
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.2
  intl: ^0.19.0  
  socket_io_client: ^2.0.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_stripe: ^10.1.1
  url_launcher: ^6.2.5
  geolocator: ^12.0.0
  file_picker: ^8.1.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/

  fonts:
  - family: Montserrat
    fonts:
      - asset: fonts/Montserrat-Regular.ttf
  - family: Playfair_Display
    fonts:
      - asset: fonts/PlayfairDisplay-Regular.ttf