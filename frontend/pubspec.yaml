name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.2.2
  app_links: ^3.4.3

  image_picker: ^1.0.7

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  socket_io_client: ^2.0.3+1
  flutter_stripe: ^10.1.1
  url_launcher: ^6.2.5
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: fonts/Montserrat-Regular.ttf

    - family: Playfair_Display
      fonts:
        - asset: fonts/PlayfairDisplay-Regular.ttf